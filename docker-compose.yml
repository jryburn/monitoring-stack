---
services:
  telegraf:
    container_name: telegraf
    image: 'docker.io/telegraf:latest'
    environment:
      - KENTIK_API_ENDPOINT=https://grpc.api.kentik.com/kmetrics/v202207/metrics
      - KENTIK_API_TOKEN=${KENTIK_API_TOKEN}
      - KENTIK_API_EMAIL=${KENTIK_API_EMAIL}
      - MOEN_USER=${MOEN_USER}
      - MOEN_PASS=${MOEN_PASS}
    volumes:
      - '/home/jryburn/monitoring-stack/telegraf:/etc/telegraf'
      # Mount script into the container
      - '/home/jryburn/monitoring-stack/telegraf/scripts:/scripts'
    restart: unless-stopped
    network_mode: host
    # Install Python + dependencies every time the container starts
    entrypoint: /bin/sh -c "apt-get update && apt-get install -y python3 python3-pip && pip3 install pyflowater retry --break-system-packages && /entrypoint.sh telegraf"

  prometheus:
    container_name: prometheus 
    image: 'prom/prometheus'
    volumes:
      - /home/jryburn/monitoring-stack/prometheus:/etc/prometheus
      - /home/jryburn/monitoring-stack/prometheus/data:/prometheus
    ports:
      - 9090:9090
    restart: always

  grafana:
    container_name: grafana
    image: 'grafana/grafana'
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASS}
    volumes:
      - /home/jryburn/monitoring-stack/grafana:/etc/grafana/provisioning/datasources
    ports:
      - 3000:3000
    restart: always

  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - /home/jryburn/monitoring-stack/loki/data:/loki
      - /home/jryburn/monitoring-stack/loki:/etc/loki
    ports:
      - 3100:3100
    restart: unless-stopped


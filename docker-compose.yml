---
services:
  telegraf:
    container_name: telegraf
    image: 'docker.io/telegraf:latest'
    environment:
      - KENTIK_API_ENDPOINT=https://grpc.api.kentik.com/kmetrics/v202207/metrics
      - KENTIK_API_TOKEN=${KENTIK_API_TOKEN}
      - KENTIK_API_EMAIL=${KENTIK_API_EMAIL}
      - MOEN_USER=${MOEN_USER}
      - MOEN_PASS=${MOEN_PASS}
      - SNMP_COMMUNITY=${SNMP_COMMUNITY}
    volumes:
      - '/home/jryburn/monitoring-stack/telegraf/telegraf.conf.toml:/etc/telegraf/telegraf.conf'
      # Mount script into the container
      - '/home/jryburn/monitoring-stack/telegraf/scripts:/scripts'
    restart: unless-stopped
    network_mode: host
    # Install Python + dependencies every time the container starts
    entrypoint: /bin/sh -c "apt-get update && apt-get install -y python3 python3-pip && pip3 install pyflowater retry --break-system-packages && /entrypoint.sh telegraf"

  prometheus:
    container_name: prometheus 
    image: 'prom/prometheus'
    volumes:
      - /home/jryburn/monitoring-stack/prometheus:/etc/prometheus
      - /home/jryburn/monitoring-stack/prometheus/data:/prometheus
    ports:
      - 9090:9090
    restart: unless-stopped

  grafana:
    container_name: grafana
    image: 'grafana/grafana:12.3.0'
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASS}
    volumes:
      - /home/jryburn/monitoring-stack/grafana/datasources.yml:/etc/grafana/provisioning/datasources/all.yml
      - /home/jryburn/monitoring-stack/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/all.yml
      - /home/jryburn/monitoring-stack/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - 3000:3000
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - /home/jryburn/monitoring-stack/loki/data:/loki
      - /home/jryburn/monitoring-stack/loki:/etc/loki
    ports:
      - 3100:3100
    restart: unless-stopped

  logstash:
    # image: docker.elastic.co/logstash/logstash:8.19.18
    build:
      dockerfile: "./logstash/logstash.Dockerfile"
    container_name: logstash
    environment:
      - XPACK_MONITORING_ENABLED=false
    volumes:
      - /home/jryburn/monitoring-stack/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    ports:
      - 1515:1515/udp
      - 1515:1515/tcp
      - 9600:9600   # Logstash monitoring API
    restart: unless-stopped
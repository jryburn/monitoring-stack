###############################################################################
#                            GLOBAL CONFIG                                    #
###############################################################################
[agent]
skip_processors_after_aggregators = false

###############################################################################
#                            DATA COLLECTION                                  #
###############################################################################
[[inputs.exec]]
## Commands array running a python script to collect Moen Flo stats
  commands = [["python3", "/scripts/moen_stats.py"]]
  timeout = "10s"
  data_format = "influx"
  interval = "10m"

# Monitors internet speed using speedtest.net service
[[inputs.internet_speed]]
  ## This plugin downloads many MB of data each time it is run. As such
  ## consider setting a higher interval for this plugin to reduce the
  ## demand on your internet connection.
  interval = "30m"
  
  ## override the default metric name
  name_override = "/internet_speed"

  ## Server ID exclude filter
  ## Allows the user to exclude or include specific server IDs received by
  ## speedtest-go. Values in the exclude option will be skipped over. Values in
  ## the include option are the only options that will be picked from.
  ##
  ## See the list of servers speedtest-go will return at:
  ##     https://www.speedtest.net/api/js/servers?engine=js&limit=10
  ##
  # server_id_exclude = []
  server_id_include = ["68610", "2391", "4557"]

###############################################################################
#                    LOCAL HOST METRICS (dockworld)                           #
###############################################################################

# CPU utilization
[[inputs.cpu]]
  percpu = false
  totalcpu = true
  collect_cpu_time = false
  report_active = true
  [inputs.cpu.tags]
    device = "dockworld"
 
# Memory utilization
[[inputs.mem]]
  [inputs.mem.tags]
    device = "dockworld"
 
# Local network interface counters
# NOTE: update 'interfaces' to match your actual NIC name(s), e.g. eth0, ens18
[[inputs.net]]
  interfaces = ["en*", "bond0", "docker0", "tailscale0", "veth*", "br-*"]
  ignore_protocol_stats = true
  [inputs.net.tags]
    device = "dockworld"

###############################################################################
#                              SNMP METRICS                                   #
###############################################################################

# --- Ubiquiti Dream Router (jryburn-fw) ---
[[inputs.snmp]]
  agents = ["192.168.0.1"]
  version = 2
  community = "${SNMP_COMMUNITY}"
  interval = "60s"
  timeout = "10s"
  retries = 3
  agent_host_tag = "source"

  [inputs.snmp.tags]
    collection_type = "snmp"
    device = "jryburn-fw"

  # --- System uptime (basic reachability/health check) ---
  [[inputs.snmp.field]]
    name = "uptime"
    oid = "1.3.6.1.2.1.1.3.0"
  
  # --- CPU (UCD-SNMP-MIB systemStats, already 0-100 percentages) ---
  [[inputs.snmp.field]]
    name = "cpuUser"
    oid = "1.3.6.1.4.1.2021.11.9.0"
  [[inputs.snmp.field]]
    name = "cpuSystem"
    oid = "1.3.6.1.4.1.2021.11.10.0"
  [[inputs.snmp.field]]
    name = "cpuIdle"
    oid = "1.3.6.1.4.1.2021.11.11.0"
 
  # --- Memory (UCD-SNMP-MIB memory group, values in KB) ---
  [[inputs.snmp.field]]
    name = "memTotalReal"
    oid = "1.3.6.1.4.1.2021.4.5.0"
  [[inputs.snmp.field]]
    name = "memAvailReal"
    oid = "1.3.6.1.4.1.2021.4.6.0"
  [[inputs.snmp.field]]
    name = "memTotalSwap"
    oid = "1.3.6.1.4.1.2021.4.3.0"
  [[inputs.snmp.field]]
    name = "memAvailSwap"
    oid = "1.3.6.1.4.1.2021.4.4.0"
 
  # --- Interface table: counters + admin/oper status (base ifTable, 32-bit) ---
  [[inputs.snmp.table]]
    name = "interface"
    inherit_tags = ["device"]
    [[inputs.snmp.table.field]]
      name = "ifIndex"
      oid = "1.3.6.1.2.1.2.2.1.1"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "ifDescr"
      oid = "1.3.6.1.2.1.2.2.1.2"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "ifAdminStatus"
      oid = "1.3.6.1.2.1.2.2.1.7"
    [[inputs.snmp.table.field]]
      name = "ifOperStatus"
      oid = "1.3.6.1.2.1.2.2.1.8"
    [[inputs.snmp.table.field]]
      name = "ifInOctets"
      oid = "1.3.6.1.2.1.2.2.1.10"
    [[inputs.snmp.table.field]]
      name = "ifOutOctets"
      oid = "1.3.6.1.2.1.2.2.1.16"
    [[inputs.snmp.table.field]]
      name = "ifInUcastPkts"
      oid = "1.3.6.1.2.1.2.2.1.11"
    [[inputs.snmp.table.field]]
      name = "ifOutUcastPkts"
      oid = "1.3.6.1.2.1.2.2.1.17"
    [[inputs.snmp.table.field]]
      name = "ifInErrors"
      oid = "1.3.6.1.2.1.2.2.1.14"
    [[inputs.snmp.table.field]]
      name = "ifOutErrors"
      oid = "1.3.6.1.2.1.2.2.1.20"

# --- JUNOS device (jryburn-sw) ---
[[inputs.snmp]]
  agents = ["192.168.0.2"]
  version = 2
  community = "${SNMP_COMMUNITY}"
  interval = "60s"
  timeout = "10s"
  retries = 3
  agent_host_tag = "source"

  [inputs.snmp.tags]
    collection_type = "snmp"
    device = "jryburn-sw"

  # --- System uptime (basic reachability/health check) ---
  [[inputs.snmp.field]]
    name = "uptime"
    # sysUpTime
    oid = "1.3.6.1.2.1.1.3.0"

  # --- CPU utilization (JUNIPER-MIB jnxOperatingTable) ---
  [[inputs.snmp.table]]
    name = "juniper_cpu"
    inherit_tags = ["device"]
    [[inputs.snmp.table.field]]
      name = "jnxOperatingDescr"
      oid = "1.3.6.1.4.1.2636.3.1.13.1.5"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "jnxOperatingCPU"
      oid = "1.3.6.1.4.1.2636.3.1.13.1.8"
    [[inputs.snmp.table.field]]
      name = "jnxOperatingBuffer"
      oid = "1.3.6.1.4.1.2636.3.1.13.1.11"
 
  # --- Interface table: counters + admin/oper status (base ifTable, 32-bit) ---
  [[inputs.snmp.table]]
    name = "interface"
    inherit_tags = ["device"]
    [[inputs.snmp.table.field]]
      name = "ifIndex"
      oid = "1.3.6.1.2.1.2.2.1.1"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "ifDescr"
      oid = "1.3.6.1.2.1.2.2.1.2"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "ifAdminStatus"
      oid = "1.3.6.1.2.1.2.2.1.7"
    [[inputs.snmp.table.field]]
      name = "ifOperStatus"
      oid = "1.3.6.1.2.1.2.2.1.8"
    [[inputs.snmp.table.field]]
      name = "ifInOctets"
      oid = "1.3.6.1.2.1.2.2.1.10"
    [[inputs.snmp.table.field]]
      name = "ifOutOctets"
      oid = "1.3.6.1.2.1.2.2.1.16"
    [[inputs.snmp.table.field]]
      name = "ifInUcastPkts"
      oid = "1.3.6.1.2.1.2.2.1.11"
    [[inputs.snmp.table.field]]
      name = "ifOutUcastPkts"
      oid = "1.3.6.1.2.1.2.2.1.17"
    [[inputs.snmp.table.field]]
      name = "ifInErrors"
      oid = "1.3.6.1.2.1.2.2.1.14"
    [[inputs.snmp.table.field]]
      name = "ifOutErrors"
      oid = "1.3.6.1.2.1.2.2.1.20"

###############################################################################
#                               WATCHERS                                      #
###############################################################################
[[inputs.ping]]
  interval = "10s"
  count = 3
  ping_interval = 1.0
  timeout = 5.0
  urls = ["jryburn-fw", "jryburn-sw", "docklands", "dockworld"]

  [inputs.ping.tags]
    collection_type = "ping"
    watcher_type = "healthcheck"

# Monitor that all our containers are responding
[[inputs.http_response]]
  name_override = "netobs_health"
  urls = ["http://telegraf:9004/metrics"]
  fieldexclude = ["content_length", "result_type"]
  tagexclude = ["status_code", "result"]

  [inputs.http_response.tags]
    collection_type = "health"
    watcher_type = "healthcheck"
    service = "telegraf"

[[inputs.http_response]]
  name_override = "netobs_health"
  urls = ["http://logstash:9600"]
  response_string_match = "\"status\":\"green\""
  fieldexclude = ["content_length", "result_type"]
  tagexclude = ["status_code", "result"]

  [inputs.http_response.tags]
    collection_type = "http"
    watcher_type = "healthcheck"
    service = "logstash"

[[inputs.http_response]]
  name_override = "netobs_health"
  urls = ["http://loki:3100/ready"]
  response_string_match = "ready"
  fieldexclude = ["content_length", "result_type"]
  tagexclude = ["status_code", "result"]

 [inputs.http_response.tags]
   collection_type = "http"
   watcher_type = "healthcheck"
   service = "loki"

[[inputs.http_response]]
  name_override = "netobs_health"
  urls = ["http://grafana:3000/api/health"]
  response_string_match = "ok"
  fieldexclude = ["content_length", "result_type"]
  tagexclude = ["status_code", "result"]

 [inputs.http_response.tags]
   collection_type = "http"
   watcher_type = "healthcheck"
   service = "grafana"

[[inputs.http_response]]
  urls = ["http://prometheus:9090/-/healthy"]
  response_string_match = "Prometheus Server is Healthy"
  name_override = "netobs_health"
  fieldexclude = ["content_length", "result_type"]
  tagexclude = ["status_code", "result"]

 [inputs.http_response.tags]
   collection_type = "http"
   watcher_type = "healthcheck"
   service = "prometheus"


##############################################################################
#                            DATA NORMALIZATION                              #
##############################################################################
[[processors.rename]]
  [[processors.rename.replace]]
    tag = "agent_host"
    dest = "device"

  [[processors.rename.replace]]
    measurement = "snmp"
    dest = "device"

  [[processors.rename.replace]]
    tag = "url"
    dest = "device"

##############################################################################
#                            DATA OUTPUT                                     #
##############################################################################
# A plugin that stores metrics in a file
# [[outputs.file]]
#     ## Files to write to, "stdout" is a specially handled file.
#     files = ["stdout", "/etc/telegraf/metrics.out"]
#     data_format = "influx" # Data format to output.
#     influx_sort_fields = false

# A plugin that can transmit metrics to an influx endpoint
[[outputs.influxdb_v2]]
   urls  = ["${KENTIK_API_ENDPOINT}"]
   http_headers = {"X-CH-Auth-Email" = "${KENTIK_API_EMAIL}", "X-CH-Auth-API-Token" = "${KENTIK_API_TOKEN}"}
   user_agent = "kentik"

[[outputs.prometheus_client]]
  # HTTP port to listen on
  listen = ":9004"

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
  - static_configs:
      - targets: ["alertmanager:9093"]
    timeout: 5s
    api_version: v2

scrape_configs:
  - job_name: prometheus
    scrape_interval: 15s
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "telegraf"
    scrape_interval: 15s
    static_configs:
      - targets: ["localhost:9004"]
